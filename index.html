<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKT48 HUB — God Tier Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff004c; --bg: #050505; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; scroll-behavior: smooth; }
        .syne { font-family: 'Syne', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* Smooth Scroll & Transitions */
        .card-hover { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .card-hover:hover { transform: translateY(-10px); border-color: var(--accent); }
        
        #multi-theater { display: none; position: fixed; inset: 0; z-index: 9999; background: #000; flex-direction: column; }
    </style>
</head>
<body class="pb-20">

    <div id="multi-theater">
        <div class="p-4 glass flex justify-between items-center">
            <span class="syne text-xs uppercase tracking-widest text-rose-500 italic">Stage View Mode</span>
            <button onclick="closeTheater()" class="bg-rose-600 px-8 py-2 rounded-full text-[10px] font-black uppercase">Exit Stage</button>
        </div>
        <div id="stream-container" class="flex-grow bg-black"></div>
    </div>

    <nav class="sticky top-0 z-40 glass border-b border-white/5 px-8 py-6 mb-12">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="syne text-3xl font-extrabold italic uppercase tracking-tighter">
                JKT<span class="text-rose-600">HUB</span>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <input type="text" id="memberSearch" onkeyup="filterAll()" placeholder="Cari Member / Video..." 
                       class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl text-xs outline-none focus:border-rose-600 w-full md:w-80">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 space-y-24">
        
        <section id="yt-section">
            <div class="flex items-center gap-4 mb-10">
                <h2 class="syne text-2xl uppercase italic tracking-tighter">YouTube <span class="text-rose-600">Updates</span></h2>
                <div class="h-[1px] flex-grow bg-white/10"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="card-hover glass rounded-[2.5rem] overflow-hidden group">
                    <div class="relative aspect-video">
                        <img src="https://img.youtube.com/vi/aOgTX9-crmg/maxresdefault.jpg" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <a href="https://www.youtube.com/watch?v=aOgTX9-crmg" target="_blank" class="bg-rose-600 p-5 rounded-full">▶</a>
                        </div>
                    </div>
                    <div class="p-8">
                        <h3 class="syne text-lg uppercase italic mb-2 line-clamp-1">Andai 'Ku Bukan Idola - JKT48</h3>
                        <p class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Performance MV • 2026</p>
                    </div>
                </div>
                <div class="card-hover glass rounded-[2.5rem] overflow-hidden group">
                    <div class="relative aspect-video">
                        <img src="https://img.youtube.com/vi/mRMQsp90mFM/maxresdefault.jpg" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <a href="https://www.youtube.com/watch?v=mRMQsp90mFM" target="_blank" class="bg-rose-600 p-5 rounded-full">▶</a>
                        </div>
                    </div>
                    <div class="p-8">
                        <h3 class="syne text-lg uppercase italic mb-2 line-clamp-1">Magic Hour - JKT48</h3>
                        <p class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Original Music Video</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="live-section">
            <h2 class="syne text-2xl uppercase italic mb-8 tracking-tighter">Live <span class="text-rose-600">Now</span></h2>
            <div id="live-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>

        <section id="recent-section">
            <div class="flex items-center gap-4 mb-10">
                <h2 class="syne text-2xl uppercase italic tracking-tighter">Recent <span class="text-white/20">Archive</span></h2>
                <div class="h-[1px] flex-grow bg-white/10"></div>
            </div>
            <div id="recent-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

    </main>

    <script>
        let liveData = [];
        let recentData = [];

        async function init() {
            try {
                const [lRes, rRes] = await Promise.all([
                    fetch('https://api.crstlnz.my.id/api/now_live?group=jkt48'),
                    fetch('https://api.crstlnz.my.id/api/recent?group=jkt48')
                ]);
                liveData = await lRes.json();
                recentData = await rRes.json();
                renderAll();
            } catch (e) { console.error("Sync error"); }
        }

        function renderAll() {
            renderLive(liveData);
            renderRecent(recentData);
        }

        function renderLive(list) {
            const container = document.getElementById('live-grid');
            container.innerHTML = list.length === 0 ? `<p class="opacity-20 uppercase tracking-widest">No member live</p>` :
            list.map(m => {
                const isIDN = m.type.toLowerCase().includes('idn');
                return `
                <div class="card-hover glass rounded-[2.5rem] overflow-hidden">
                    <div class="relative aspect-video">
                        <img src="${m.img}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 ${isIDN ? 'bg-blue-600' : 'bg-rose-600'} px-3 py-1 rounded text-[8px] font-black uppercase tracking-widest">${m.type}</div>
                    </div>
                    <div class="p-8">
                        <h3 class="syne text-xl uppercase italic mb-1">${m.name}</h3>
                        <p class="text-[10px] text-white/30 font-bold mb-6 tracking-widest uppercase">${m.viewers.toLocaleString()} Penonton</p>
                        ${isIDN ? 
                            `<a href="${m.url}" target="_blank" class="block w-full text-center bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase">Buka IDN ↗</a>` : 
                            `<button onclick="openStage('${m.room_id}')" class="w-full bg-white text-black py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-rose-600 hover:text-white transition-all">Nonton di Web</button>`
                        }
                    </div>
                </div>`;
            }).join('');
        }

        function renderRecent(list) {
            const container = document.getElementById('recent-grid');
            container.innerHTML = list.slice(0, 6).map(m => {
                const giftNominal = m.points ? m.points.toLocaleString() : "Analyzing...";
                return `
                <div class="card-hover glass rounded-[2rem] p-6 cursor-pointer" onclick="window.open('${m.url}', '_blank')">
                    <div class="flex items-center gap-4 mb-4">
                        <img src="${m.member.img}" class="w-10 h-10 rounded-xl object-cover grayscale">
                        <h4 class="syne text-xs uppercase italic">${m.member.name}</h4>
                    </div>
                    <div class="bg-white/5 rounded-xl p-3 mb-4">
                        <div class="flex justify-between text-[9px] font-bold">
                            <span class="opacity-40 uppercase">Gift Total</span>
                            <span class="text-yellow-500">${giftNominal} G</span>
                        </div>
                    </div>
                    <p class="text-[10px] text-white/30 italic">Selesai: ${m.live_info.date.end || 'Baru saja'}</p>
                </div>`;
            }).join('');
        }

        function filterAll() {
            const q = document.getElementById('memberSearch').value.toLowerCase();
            renderLive(liveData.filter(m => m.name.toLowerCase().includes(q)));
            renderRecent(recentData.filter(m => m.member.name.toLowerCase().includes(q)));
        }

        function openStage(roomId) {
            const container = document.getElementById('stream-container');
            container.innerHTML = `<iframe src="https://www.showroom-live.com/streaming/embed?room_id=${roomId}&autoplay=1&muted=1" allowfullscreen></iframe>`;
            document.getElementById('multi-theater').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeTheater() {
            document.getElementById('multi-theater').style.display = 'none';
            document.getElementById('stream-container').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        init();
        setInterval(init, 60000);
    </script>
</body>
</html>
